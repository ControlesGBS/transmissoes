<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — GBS Serviços</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f4f6f4;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border:0.5px solid #c0dcc0;border-radius:12px;padding:36px 32px;width:340px;text-align:center}
.card img{height:60px;margin-bottom:16px}
.card h2{font-size:15px;font-weight:500;color:#1a4a1a;margin-bottom:4px}
.card p{font-size:12px;color:#4a7a4a;margin-bottom:24px}
.campo{width:100%;border:0.5px solid #a0c8a0;border-radius:6px;padding:9px 12px;font-size:13px;background:#f8fbf8;color:#1a2a1a;margin-bottom:12px}
.campo:focus{outline:none;border-color:#2d7a2d}
.btn{width:100%;background:#2d7a2d;color:#fff;border:none;border-radius:6px;padding:10px;font-size:14px;font-weight:500;cursor:pointer}
.btn:hover{background:#1a5a1a}
.btn:disabled{background:#90c090;cursor:not-allowed}
.msg{font-size:12px;margin-top:12px;min-height:18px;color:#a32d2d}
.msg.ok{color:#2d7a2d}
.olho-wrap{position:relative}
.olho-wrap input{padding-right:36px}
.olho{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#4a7a4a;font-size:16px;padding:0;line-height:1}
</style>
</head>
<body>
<div class="card">
  <img src="logo_gbs.png" alt="GBS" onerror="this.style.display='none'">
  <h2>GBS Serviços</h2>
  <p>Acesso restrito — Área interna</p>
  <input class="campo" type="email" id="email" placeholder="E-mail" autocomplete="username">
  <div class="olho-wrap">
    <input class="campo" type="password" id="senha" placeholder="Senha" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')entrar()">
    <button class="olho" onclick="toggleSenha()" tabindex="-1" title="Mostrar senha">&#128065;</button>
  </div>
  <button class="btn" id="btn-entrar" onclick="entrar()">Entrar</button>
  <div class="msg" id="msg"></div>
</div>
<script>
const SUPABASE_URL = 'https://ndwivbhqglpnfyqwjbzu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kd2l2YmhxZ2xwbmZ5cXdqYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjMwNzksImV4cCI6MjA5NTk5OTA3OX0.uYzp_BlsQlgMp48k10gpSQdBReXJToGuVAkh38i3ABg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function toggleSenha(){
  const inp = document.getElementById('senha');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function entrar(){
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const msg   = document.getElementById('msg');
  const btn   = document.getElementById('btn-entrar');
  if(!email||!senha){ msg.textContent='Preencha e-mail e senha.'; return; }
  btn.disabled=true; msg.textContent='Entrando...'; msg.className='msg';
  const {error} = await sb.auth.signInWithPassword({email, password:senha});
  if(error){
    msg.textContent = 'E-mail ou senha incorretos.';
    btn.disabled=false;
  } else {
    msg.className='msg ok'; msg.textContent='OK, redirecionando...';
    location.href='index.html';
  }
}

// Se já logado, redireciona direto
(async()=>{
  const {data:{user}}=await sb.auth.getUser();
  if(user) location.href='index.html';
})();
</script>
</body>
</html>
